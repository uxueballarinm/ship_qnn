## Combination 1
- window_size: 5
  data: data/reduce_row_number_absolutes
  save_dir: 3_head_model_systematic_experiments
  select_features: &id001 [sv, wv, yr, ya, rarad]
  model: multihead
  predict: motion
  optimizer: spsa
  maxiter: 4000
  batch_size: 256
  learning_rate: &id002 [0.1, 0.001]
  perturbation: 0.15
  weights: &id003 [1.0, 1.0, 1.0, 1.0]
  initialization: identity
  save_plot: false
  run: 0
  heads_config:
  - features: &id004 [sv, wv, yr, ya, rarad]
    output_dim: 1
    map: &id005 [2, 3, 4, 0, 1, -1]
    reps: 1
    encoding: serial
    ansatz: efficientsu2
    entangle: linear
  - features: *id004
    output_dim: 1
    map: &id006 [2, 3, 4, 1, 0, -1]
    reps: 1
    encoding: serial
    ansatz: efficientsu2
    entangle: linear
  - features: *id004
    output_dim: 2
    map: &id007 [0, 1, 4, 2, 3, -1]
    reps: 1
    encoding: serial
    ansatz: efficientsu2
    entangle: linear
