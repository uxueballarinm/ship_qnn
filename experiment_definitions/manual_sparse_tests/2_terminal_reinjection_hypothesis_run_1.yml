# ==========================================
# RUN 1: SEED 1 (14 Experiments)
# ==========================================
- window_size: 5
  data: data/reduce_row_number_absolutes
  save_dir: hypothesis_reinjection_results
  model: multihead
  predict: motion
  optimizer: spsa
  maxiter: 4000
  batch_size: 512
  learning_rate: &lr [0.05, 0.001]
  perturbation: 0.1
  weights: &wt [1.0, 1.0, 1.0, 1.0]
  initialization: identity
  save_plot: false
  run: 1
  heads_config:
  - features: [wv, sv, yr, ya, rarad]
    output_dim: 4
    reps: 1
    ansatz: ugates
    entangle: reverse_linear
    encoding: compact
    map: &map1 [1, 0, 4, 2, 1, 4, 3, 2, 4]
