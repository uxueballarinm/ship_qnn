- window_size: 5
  data: data/reduce_row_number_absolutes
  save_dir: thesis_final_optimization
  select_features: [wv, sv, yr, ya, rarad]
  model: multihead
  predict: motion
  optimizer: spsa
  maxiter: 4000
  batch_size: 256
  learning_rate: [0.05, 0.001]
  perturbation: 0.15
  # PHYSICS WEIGHTING: We prioritize Head 1 and Head 3 stability
  # Weights: [Surge, Sway, YawRate, YawAngle]
  weights: [2.0, 1.0, 1.0, 5.0] 
  initialization: identity
  save_plot: false
  run: 1
  heads_config:
    # HEAD 1: Surge (Target: wv)
    # Goal: Capture centripetal drag by repeating Surge(0) and YawRate(2)
    - features: [wv, sv, yr, rarad]
      output_dim: 1
      reps: 2 # Increased complexity for speed-loss dynamics
      encoding: serial
      ansatz: efficientsu2
      entangle: reverse_linear
      map: [0, 2, 3, 0, 2, -1] # [wv, yr, rudder, wv, yr, bias]

    # HEAD 2: Hydrodynamics (Targets: sv, yr)
    # Kept from your winner - it's already performing at 0.92
    - features: [wv, sv, yr, ya, rarad]
      output_dim: 2
      reps: 1
      encoding: serial
      ansatz: efficientsu2
      entangle: reverse_linear
      map: [-1, 0, 1, 2, 3, 4]

    # HEAD 3: Integration Stability (Target: ya)
    # Goal: Use deeper circuit and circular entanglement for periodic stability
    - features: [yr, ya, rarad]
      output_dim: 1
      reps: 2 # More depth to manage recursive drift
      encoding: serial
      ansatz: efficientsu2
      entangle: circular # Better for periodic/angle features
      map: [0, 1, 2, 0, 1, 2] # Repeat [yr, ya, rudder] twice